<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Fotográfico - Moisés Studio V2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="portafolio"> 

    <header>
        <h1 class="logo">Moisés Studio</h1>
        <nav>
            <ul>
                <li><a href="#portafolio">Portafolio</a></li>
                <li><a href="#contacto">Contacto</a></li>
                <li>
                    <label class="theme-switch" for="checkbox-noche" title="Cambiar tema">
                        <input type="checkbox" id="checkbox-noche" />
                        <div class="slider-theme">
                            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                        </div>
                    </label>
                </li>
            </ul>
        </nav>
    </header>

    <div class="filtros">
        <button class="btn-filtro activo" data-filtro="todos">Todos</button>
        <button class="btn-filtro" data-filtro="retratos">Retratos & Moda</button>
        <button class="btn-filtro" data-filtro="eventos">Conciertos & Eventos</button>
        <button class="btn-filtro" data-filtro="arquitectura">Arquitectura & Paisajes</button>
        <button class="btn-filtro" data-filtro="retoque">Retoque Digital</button>
    </div>

    <main class="galeria">
        <img src="img/WhatsApp Image 2026-02-24 at 9.12.44 PM (1).jpeg" alt="Fotografía 1" data-categoria="retratos" class="animar-entrada">
        <img src="img/WhatsApp Image 2026-02-24 at 9.12.44 PM (2).jpeg" alt="Fotografía 2" data-categoria="retratos" class="animar-entrada">
        <img src="img/WhatsApp Image 2026-02-24 at 9.12.44 PM.jpeg"     alt="Fotografía 3" data-categoria="retratos" class="animar-entrada">
        <img src="img/WhatsApp Image 2026-02-25 at 2.27.43 PM (2).jpeg" alt="Fotografía 4" data-categoria="retratos" class="animar-entrada">
        <img src="img/WhatsApp Image 2026-02-25 at 2.27.46 PM (1).jpeg" alt="Fotografía 5" data-categoria="retratos" class="animar-entrada">
        <img src="img/WhatsApp Image 2026-02-25 at 2.27.49 PM (1).jpeg" alt="Fotografía 6" data-categoria="retratos" class="animar-entrada">
        <img src="img/foto_arquitectura.jpg" alt="Fotografía 5" data-categoria="arquitectura" class="animar-entrada">
        <img src="img/foto_chica.jpg" alt="Fotografía 5" data-categoria="retratos" class="animar-entrada">
        <img src="img/foto_concierto.jpg" alt="Fotografía 6" data-categoria="eventos" class="animar-entrada">

        <div class="antes-despues animar-entrada oculto" data-categoria="retoque">
            <img src="img/sunset-playa-antes.jpeg" alt="Sin editar" class="img-fondo">
            <img src="img/sunset-playa-despues.jpeg" alt="Editada" class="img-frente">


            <input type="range" min="0" max="100" value="50" class="slider-rango">
            
            <div class="linea-divisora">
                <div class="flechitas">◀ ▶</div>
            </div>
        </div>
    </main>

    <footer id="contacto" class="seccion-contacto">
        <h2>¿Trabajamos juntos?</h2>
        <p>Escríbeme para cotizar tu próxima sesión de fotos o proyecto gráfico.</p>
        <a href="mailto:tuamigo@correo.com" class="btn-correo">Enviar un correo</a>
    </footer>

    <div id="lightbox" class="lightbox">
        <span id="cerrar">&times;</span>
        <span id="flecha-izq" class="flecha">&#10094;</span>
        <img id="foto-ampliada" src="" alt="Ampliada">
        <span id="flecha-der" class="flecha">&#10095;</span>
    </div>

    <script>
        // --- VARIABLES ACTUALIZADAS V2.0 ---
        
        // Separamos las fotos normales (que abren lightbox) del deslizador
        const fotosNormales = document.querySelectorAll('.galeria > img');
        // Capturamos TODOS los elementos que se pueden filtrar (fotos + deslizador)
        const elementosFiltrables = document.querySelectorAll('.galeria > img, .galeria > .antes-despues');
        
        const lightbox = document.getElementById('lightbox');
        const fotoAmpliada = document.getElementById('foto-ampliada');
        const botonCerrar = document.getElementById('cerrar');
        const botonesFiltro = document.querySelectorAll('.btn-filtro');
        
        // Variables de navegación de la galería
        const flechaIzq = document.getElementById('flecha-izq');
        const flechaDer = document.getElementById('flecha-der');
        let indiceActual = 0;
        let imagenesVisibles = []; 

        // Actualiza la lista de imágenes que NO están ocultas (solo para lightbox)
        function actualizarImagenesVisibles() {
            // Solo filtramos las etiquetas <img> normales, no el div antes-despues
            imagenesVisibles = Array.from(fotosNormales).filter(img => !img.classList.contains('oculto'));
        }

        // 1. Abrir foto (Solo funciona para las fotos normales)
        fotosNormales.forEach(img => {
            img.addEventListener('click', () => {
                actualizarImagenesVisibles();
                indiceActual = imagenesVisibles.indexOf(img);
                
                lightbox.style.display = 'flex';
                fotoAmpliada.src = img.src; 
            });
        });

        // 2. Cerrar (X o fondo negro)
        botonCerrar.addEventListener('click', () => { lightbox.style.display = 'none'; });
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) { lightbox.style.display = 'none'; }
        });

        // 3. FLECHAS DE NAVEGACIÓN
        flechaIzq.addEventListener('click', () => {
            if (imagenesVisibles.length === 0) return;
            indiceActual--;
            if (indiceActual < 0) { indiceActual = imagenesVisibles.length - 1; }
            fotoAmpliada.src = imagenesVisibles[indiceActual].src;
        });

        flechaDer.addEventListener('click', () => {
            if (imagenesVisibles.length === 0) return;
            indiceActual++;
            if (indiceActual >= imagenesVisibles.length) { indiceActual = 0; }
            fotoAmpliada.src = imagenesVisibles[indiceActual].src;
        });

        // 4. SISTEMA DE FILTROS ACTUALIZADO V2.0 (Controla fotos y deslizador)
        botonesFiltro.forEach(boton => {
            boton.addEventListener('click', () => {
                botonesFiltro.forEach(btn => btn.classList.remove('activo'));
                boton.classList.add('activo');

                const filtroElegido = boton.getAttribute('data-filtro');

                elementosFiltrables.forEach(elemento => {
                    const categoria = elemento.getAttribute('data-categoria');

                    if (filtroElegido === 'todos' || filtroElegido === categoria) {
                        elemento.classList.remove('oculto');
                        
                        elemento.classList.remove('animar-entrada');
                        void elemento.offsetWidth; 
                        elemento.classList.add('animar-entrada');
                    } else {
                        elemento.classList.add('oculto');
                    }
                });
            });
        });

        // 5. NUEVO: LÓGICA MODO NOCHE V2.0 (Nuevo Switch)
        const toggleNoche = document.getElementById('checkbox-noche');
        
        // Comprobar si ya estaba activo (opcional, para persistencia local)
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            toggleNoche.checked = true;
        }

        toggleNoche.addEventListener('change', () => {
            if (toggleNoche.checked) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            }
        });

// 6. CORRECCIÓN V2.0: Lógica invertida para que 'Antes' esté a la izquierda
        // y 'Después' esté a la derecha
        const contenedoresSlider = document.querySelectorAll('.antes-despues');
        
        contenedoresSlider.forEach(contenedor => {
            const slider = contenedor.querySelector('.slider-rango');
            const imgFrente = contenedor.querySelector('.img-frente');
            const linea = contenedor.querySelector('.linea-divisora');

            // Escuchamos el evento 'input' mientras arrastramos el slider
            slider.addEventListener('input', (e) => {
                const porcentaje = e.target.value;
                
                // --- CAMBIO CLAVE AQUÍ ---
                // Definimos el recorte empezando en el porcentaje actual hacia la derecha (100%)
                // polygon(X% 0, 100% 0, 100% 100%, X% 100%)
                // Esto revela la imagen de arriba ('Después') moviéndose de derecha a izquierda
                imgFrente.style.clipPath = `polygon(${porcentaje}% 0, 100% 0, 100% 100%, ${porcentaje}% 100%)`;
                
                // Movemos la línea divisora visual
                linea.style.left = `${porcentaje}%`;
            });
        });
    </script>
</body>
</html>
